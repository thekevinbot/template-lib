name: Node

on:
  pull_request:
    paths:
      - 'packages/node/**'
      - 'packages/rust/core/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/node.yml'

permissions:
  contents: read

jobs:
  lint:
    name: Lint + typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/node
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck

  test:
    name: Build addon + tests + smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install + build (napi addon)
        run: |
          pnpm install --no-frozen-lockfile
          pnpm run build
        working-directory: packages/node
      - name: Vitest
        run: pnpm run test
        working-directory: packages/node
      - name: SDK import + CLI smoke
        run: |
          node -e "const { Counter } = require('./index.js'); const c = new Counter(); c.add('a a b'); if (c.mostCommon(2)[0].word !== 'a') process.exit(1);"
          node cli.js --top 2 "a a b" | grep -q "^a	2$"
        working-directory: packages/node
