name: Rust

on:
  pull_request:
    paths:
      - 'packages/rust/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/rust.yml'

permissions:
  contents: read

# All cargo invocations are scoped to -p core/cli. NEVER --workspace /
# --all-targets: that would build the pyo3 + napi binding cdylibs without their
# FFI feature and fail to link (esp. on macOS). Bindings are exercised by the
# Python / Node workflows and the conformance gate.
jobs:
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt -p mynewproduct -- --check
      - run: cargo clippy -p mynewproduct -- -D warnings

  unit:
    name: Unit tests + coverage (95%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo test -p mynewproduct
      - run: cargo llvm-cov -p mynewproduct --ignore-filename-regex 'main\.rs' --fail-under-lines 90

  build:
    name: Build + CLI smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p mynewproduct
      - name: Smoke (--version + count)
        run: |
          ./target/release/mynewproduct --version
          ./target/release/mynewproduct --top 2 "a a b" | grep -q "^a	2$"
