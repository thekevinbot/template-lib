name: Dependencies

# Two structural dependency-hygiene gates (see internals/repo.md):
#   - no committed automation auto-fetches a package outside the pinned manifest
#   - no pnpm project resolves a deprecated package that isn't explicitly
#     allow-listed under "pnpm.allowedDeprecatedVersions" in its package.json
# Both run the same scripts `just deps-guard` / `just deps-check` invoke locally.

on:
  pull_request:
    paths:
      - '**/package.json'
      - '**/pnpm-lock.yaml'
      - '**/*.mjs'
      - '**/*.cjs'
      - '**/*.js'
      - '**/*.sh'
      - 'justfile'
      - 'scripts/**'
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  no-auto-install:
    name: No auto-install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/check-no-auto-install.sh

  no-deprecated:
    name: No deprecated deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: bash scripts/check-no-deprecated-deps.sh
