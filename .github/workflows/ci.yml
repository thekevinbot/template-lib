name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      node: ${{ steps.filter.outputs.node }}
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'packages/rust/**'
              - '.github/workflows/ci.yml'
            node:
              - 'packages/node/**'
              - '.github/workflows/ci.yml'
            python:
              - 'packages/python/**'
              - 'packages/rust/**'
              - '.github/workflows/ci.yml'

  rust:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/rust
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo llvm-cov --ignore-filename-regex 'main\.rs' --fail-under-lines 95 --lcov --output-path lcov.info

  node:
    needs: changes
    if: needs.changes.outputs.node == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/node
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: packages/node/pnpm-lock.yaml
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run coverage

  python:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/rust
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pipx install maturin
      - name: build wheel
        run: maturin build --release -o dist
        working-directory: packages/python
      - name: install + smoke test
        run: |
          python -m venv .venv
          .venv/bin/pip install packages/python/dist/*.whl
          .venv/bin/darkfactory --version

  all-green:
    if: always()
    needs: [rust, node, python]
    runs-on: ubuntu-latest
    steps:
      - name: verify no required job failed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "one or more required jobs failed"
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "one or more required jobs were cancelled"
            exit 1
          fi
