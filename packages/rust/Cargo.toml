[package]
name = "darkfactory-cli"
version = "0.0.1"
edition = "2021"
license = "MIT"
authors = ["Kevin Scott <me@thekevinscott.com>"]
repository = "https://github.com/thekevinscott/darkfactory"
description = "CLI for the dark factory pattern: non-interactive agents converge specs into code without human review."

[lib]
name = "darkfactory"
path = "src/lib.rs"

[[bin]]
name = "darkfactory"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
anyhow = "1.0"
