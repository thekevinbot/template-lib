[build-system]
requires = ["maturin>=1.7,<2.0"]
build-backend = "maturin"

[project]
name = "mynewproduct"
dynamic = ["version"]
description = "A short, one-line description of your project."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "Kevin Scott", email = "me@thekevinscott.com" }]

[project.urls]
Repository = "https://github.com/org/mynewproduct"

[tool.maturin]
manifest-path = "../rust/Cargo.toml"
bindings = "bin"
