[build-system]
requires = ["maturin>=1.7,<2.0"]
build-backend = "maturin"

[project]
name = "darkfactory"
version = "0.0.1"
description = "CLI for the dark factory pattern: non-interactive agents converge specs into code without human review."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "Kevin Scott", email = "me@thekevinscott.com" }]

[project.urls]
Repository = "https://github.com/thekevinscott/darkfactory"

[tool.maturin]
manifest-path = "../rust/Cargo.toml"
bindings = "bin"
