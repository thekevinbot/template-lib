[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "darkfactory"
version = "0.0.1"
description = "Python SDK for the darkfactory CLI"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "Kevin Scott", email = "me@thekevinscott.com" }]
classifiers = [
  "Programming Language :: Python :: 3",
  "License :: OSI Approved :: MIT License",
]

[project.urls]
Repository = "https://github.com/thekevinscott/darkfactory"

[tool.hatch.build.targets.wheel]
packages = ["python/darkfactory"]
